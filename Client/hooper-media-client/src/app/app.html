        <div class="hidden sm:ml-6 sm:block">
          <div class="flex items-center space-x-4">

            <a href="#" class="rounded-md px-3 py-2 text-sm font-medium text-gray-700 hover:bg-gray-100 hover:text-gray-900">{{ translate('app.menu.address') }}</a>
          </div>
        </div>
      </div>
      <div class="absolute inset-y-0 right-0 flex items-center pr-2 sm:static sm:inset-auto sm:ml-6 sm:pr-0">
        <button type="button" class="relative rounded-full p-1 text-gray-600 hover:text-gray-900 focus:outline-2 focus:outline-offset-2 focus:outline-indigo-500">
          <span class="absolute -inset-1.5"></span>
          <span class="sr-only">{{ translate('app.menu.viewNotifications') }}</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" data-slot="icon" aria-hidden="true" class="size-6">
            <path d="M14.857 17.082a23.848 23.848 0 0 0 5.454-1.31A8.967 8.967 0 0 1 18 9.75V9A6 6 0 0 0 6 9v.75a8.967 8.967 0 0 1-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 0 1-5.714 0m5.714 0a3 3 0 1 1-5.714 0" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </button>

        <label for="language-select" class="sr-only">{{ translate('app.language.label') }}</label>
        <select
          id="language-select"
          [value]="currentLanguage()"
          (change)="updateLanguage($any($event.target).value)"
          class="ml-3 rounded-md border border-gray-300 bg-white px-2 py-1 text-sm text-gray-700 hover:border-gray-400 focus:outline-2 focus:outline-offset-2 focus:outline-indigo-500"
        >
          @for (language of languages(); track language.code) {
            <option [value]="language.code">{{ language.label }}</option>
          }
        </select>

         
      </div>
    </div>
  </div>

  @if (isMobileMenuOpen()) {
  <div id="mobile-menu" class="sm:hidden border-t border-gray-200 bg-gray-50">

      <a routerLink="/persons" routerLinkActive="bg-indigo-100 text-indigo-700" [routerLinkActiveOptions]="{ exact: true }" (click)="closeMobileMenu()" class="block rounded-md px-3 py-2 text-base font-medium text-gray-700 hover:bg-gray-100 hover:text-gray-900">{{ translate('app.menu.person') }}</a>
      <a href="#" (click)="closeMobileMenu()" class="block rounded-md px-3 py-2 text-base font-medium text-gray-700 hover:bg-gray-100 hover:text-gray-900">{{ translate('app.menu.address') }}</a>

      <div class="pt-2">
        <label for="mobile-language-select" class="mb-1 block text-xs font-medium text-gray-700">{{ translate('app.language.label') }}</label>
        <select
          id="mobile-language-select"
          [value]="currentLanguage()"
          (change)="updateLanguage($any($event.target).value)"
          class="w-full rounded-md border border-gray-300 bg-white px-2 py-2 text-sm text-gray-700 hover:border-gray-400"
        >
          @for (language of languages(); track language.code) {
            <option [value]="language.code">{{ language.label }}</option>
          }
        </select>
      </div>
    </div>
  </div>
