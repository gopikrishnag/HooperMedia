services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: hoopermedia-sql
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourStrong!Passw0rd"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    networks:
      - hoopermedia-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P $$MSSQL_SA_PASSWORD -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  api:
    build:
      context: .
      dockerfile: HooperMedia.Api/Dockerfile
    container_name: hoopermedia-api
    restart: unless-stopped
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=HooperMediaDb;User ID=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True;Encrypt=False"
    ports:
      - "8080:8080"
    networks:
      - hoopermedia-network

volumes:
  sqlserver-data:

networks:
  hoopermedia-network: